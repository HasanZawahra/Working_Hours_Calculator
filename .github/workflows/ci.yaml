# yaml
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        gradle-dir: [ "." ]  # change to the folder that contains `gradlew`, e.g. "server" or "android"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle build
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: ${{ matrix.gradle-dir }}
          arguments: clean build --no-daemon

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Dart build/test
        shell: bash
        run: |
          if [ -f "pubspec.yaml" ]; then
            dart pub get
            dart test || true
          fi

      - name: C++ build
        shell: bash
        run: |
          if [ -f "CMakeLists.txt" ]; then
            cmake -S . -B build
            cmake --build build --config Release
          elif [ -f "Makefile" ]; then
            make
          else
            echo "No C++ build config found, skipping."
          fi

      - name: Upload Gradle artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-${{ runner.os }}
          path: |
            **/build/libs/**
            **/build/reports/**
          if-no-files-found: warn

      - name: Upload Dart artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dart-build-${{ runner.os }}
          path: |
            build/**
            coverage**
          if-no-files-found: warn

      - name: Upload C++ binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build-${{ runner.os }}
          path: |
            build/**
            bin/**
          if-no-files-found: warn
