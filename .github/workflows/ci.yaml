# yaml
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0" # set to your required version

      - name: Create local.properties for Android
        working-directory: android
        run: |
          echo "sdk.dir=${ANDROID_SDK_ROOT}" > local.properties
          echo "flutter.sdk=${FLUTTER_HOME}" >> local.properties
          echo "Generated local.properties: sdk.dir=${ANDROID_SDK_ROOT}, flutter.sdk=${FLUTTER_HOME}"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Gradle build
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: android
          arguments: clean build --no-daemon

      - name: Upload Gradle artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-${{ runner.os }}
          path: |
            **/build/libs/**
            **/build/reports/**
          if-no-files-found: warn
