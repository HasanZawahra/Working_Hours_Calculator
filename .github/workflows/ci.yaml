# yaml
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.38.9"

      - name: Flutter pub get
        run: flutter pub get

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Flutter Windows (desktop)
        run: |
          flutter config --enable-windows-desktop
          flutter build windows --release

      - name: Create unsigned MSIX
        run: flutter pub run msix:create

      - name: Decode signing cert
        if: ${{ secrets.WINDOWS_PFX_BASE64 && secrets.WINDOWS_PFX_PASSWORD }}
        shell: powershell
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.WINDOWS_PFX_BASE64 }}")
          [IO.File]::WriteAllBytes("signing_cert.pfx", $bytes)

      - name: Create signed MSIX
        if: ${{ secrets.WINDOWS_PFX_BASE64 && secrets.WINDOWS_PFX_PASSWORD }}
        run: flutter pub run msix:create --signingCertificatePath signing_cert.pfx --signingCertificatePassword "${{ secrets.WINDOWS_PFX_PASSWORD }}"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: msix
          path: build/windows/msix/*.msix
          if-no-files-found: warn
