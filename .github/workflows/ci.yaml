# yaml
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java/Kotlin (Gradle)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # If your Gradle wrapper lives in a subdirectory, set it here
      # e.g. working-directory: 'server' or 'android'
      - name: Gradle build
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false
      - name: Run Gradle build
        shell: bash
        working-directory: .
        run: |
          if [ -f "gradlew" ] || [ -f "./gradlew" ]; then
            chmod +x ./gradlew || true
            ./gradlew clean build --no-daemon
          else
            echo "Gradle wrapper not found. Failing step."
            exit 1
          fi

      # Dart
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Cache Pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Dart build/test
        shell: bash
        run: |
          if [ -f "pubspec.yaml" ]; then
            dart pub get
            dart test || true
          fi

      # C++
      - name: C++ build
        shell: bash
        run: |
          if [ -f "CMakeLists.txt" ]; then
            cmake -S . -B build
            cmake --build build --config Release
          elif [ -f "Makefile" ]; then
            make
          else
            echo "No C++ build config found, skipping."
          fi

      # Upload artifacts
      - name: Upload Gradle artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-build-${{ runner.os }}
          path: |
            **/build/libs/**
            **/build/reports/**
          if-no-files-found: warn

      - name: Upload Dart artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dart-build-${{ runner.os }}
          path: |
            build/**
            coverage/**
          if-no-files-found: warn

      - name: Upload C++ binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-build-${{ runner.os }}
          path: |
            build/**
            bin/**
          if-no-files-found: warn
